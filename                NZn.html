<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a4373">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AgroPro JDB">
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Agro Pro - João Divino Barbosa ®","short_name":"AgroPro","start_url":"./index.html","display":"standalone","background_color":"#ffffff","theme_color":"#1a4373","icons":[{"src":"icon.png","sizes":"192x192","type":"image/png"},{"src":"icon.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <title>Agro Pro - João Divino Barbosa ®</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary:#1a4373; --bg:#f0f2f5; --warning:#f39c12; --danger:#e74c3c; --success:#25d366; --dark-card: #2c3e50; --text-muted: #5a6e7c; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background:var(--bg); padding:12px; margin:0; padding-bottom: 40px; padding-top: calc(env(safe-area-inset-top) + 12px); }
        .card { background:white; padding:18px; border-radius:18px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin-bottom:16px; border-left:6px solid var(--primary); }
        h2 { font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:800; display:flex; align-items:center; gap:6px; }
        input, textarea, select { width:100%; padding:14px; margin-bottom:10px; border:2px solid #e2e8f0; border-radius:12px; font-size:16px; font-weight:600; outline: none; background: white; }
        .row { display:flex; gap:10px; }
        button { width:100%; padding:16px; border:none; border-radius:40px; font-weight:bold; font-size:15px; color:white; margin-bottom:8px; cursor:pointer; }
        .card-medicao { background: var(--dark-card); color: white; border-left-color: #1abc9c; }
        .card-medicao input { background: #34495e; border: none; color: #1abc9c; font-size: 24px; text-align: center; }
        .card-manutencao { border-left-color: var(--warning); background: #fffdf0; }
        .btn-manut { background: var(--warning); }
        .btn-manut.ativo { background: #d35400; }
        .hidden { display: none; }
        footer { text-align:center; font-size:10px; margin:20px; color:#94a3b8; font-weight: bold; }
    </style>
</head>
<body onload="carregarDados()">

<div class="card" style="text-align:center;">
    <img src="icon.png" alt="Logo" style="width:120px; border-radius:15px; margin-bottom:10px;">
    <h2>📋 1. IDENTIFICAÇÃO</h2>
    <input id="fazenda" placeholder="Fazenda" oninput="salvar()">
    <input id="talhao" placeholder="Talhão" oninput="salvar()">
    <input id="op" placeholder="Operador" oninput="salvar()">
    <div class="row">
        <select id="tipoMaq" onchange="salvar()" style="flex:1.8">
            <option value="">Máquina...</option>
            <option value="Escavadeira">Escavadeira</option>
            <option value="Pá Carregadeira">Pá Carregadeira</option>
            <option value="Trator">Trator</option>
            <option value="Trator de Esteira">Trator de Esteira</option>
            <option value="Pulverizador">Pulverizador</option>
            <option value="Colhedeira">Colhedeira</option>
            <option value="Caminhão">Caminhão</option>
        </select>
        <input id="numMaq" placeholder="Nº/Pref" oninput="salvar()" style="flex:1">
    </div>
</div>

<div class="card card-medicao">
    <h2>📊 2. HORÍMETRO</h2>
    <div class="row">
        <div style="flex:1"><span style="font-size:10px; color:#1abc9c;">INICIAL</span><input type="number" id="vI" step="0.1" oninput="salvar()"></div>
        <div style="flex:1"><span style="font-size:10px; color:#1abc9c;">FINAL</span><input type="number" id="vF" step="0.1" oninput="salvar()"></div>
    </div>
    <div style="text-align: center; margin-top: 10px;">
        <span id="totMaqVisual" style="font-size: 26px; font-weight: 900;">0.00</span>
        <div id="msgTrava" style="font-size: 9px; color: #1abc9c; margin-top: 5px;"></div>
    </div>
</div>

<div class="card card-manutencao">
    <h2>🛠️ 3. MANUTENÇÃO</h2>
    <button id="btnManut" class="btn-manut" onclick="alternarManutencao()">🔧 INICIAR MANUTENÇÃO</button>
    <div id="infoManut" class="hidden">
        <textarea id="justManut" placeholder="Descreva a manutenção..." oninput="salvar()" style="margin-top:10px"></textarea>
    </div>
</div>

<div class="card">
    <h2>⏱️ 4. JORNADA</h2>
    <div class="row" style="text-align:center">
        <div style="flex:1"><label style="font-size:9px;">INÍCIO</label><input id="sIni" readonly style="border:none; text-align:center;"></div>
        <div style="flex:1"><label style="font-size:9px;">FIM</label><input id="sFim" readonly style="border:none; text-align:center;"></div>
    </div>
    <button style="background:#1a4373" onclick="marcar('ini')">▶ ABRIR DIA</button>
    <button style="background:#475569" onclick="marcar('fim')">⏹️ FECHAR DIA</button>
    <div style="background:#eef2ff; padding:10px; border-radius:12px; text-align:center; margin-top:10px;">
        <span id="tSist" style="font-weight:900; color:#1a4373; font-size:18px;">Tempo Líquido: 0h 0min</span>
    </div>
</div>

<div class="card">
    <button style="background:#e74c3c" onclick="gerarPDF()">📄 PDF PROFISSIONAL</button>
    <button style="background:#25d366" onclick="enviarWA()">📱 WHATSAPP</button>
    <button onclick="limparTudo()" style="background:#95a5a6; font-size:10px; padding:5px;">🔄 RESETAR</button>
</div>

<footer>Desenvolvido por João Divino Barbosa ®</footer>

<script>
// O SEGREDO ESTÁ AQUI: O SERVICE WORKER PRECISA SER REAL
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('AgroPro Pronto Offline!');
    }).catch(err => console.log('Erro SW:', err));
  });
}

// Funções de lógica (Salvar, Carregar, Calcular, Marcar, PDF, WA) permanecem as mesmas...
// [Omitidas aqui para o código ficar menor, mas devem estar no seu arquivo final]
</script>
</body>
</html>
